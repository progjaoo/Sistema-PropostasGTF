kind = "web"
previewPath = "/"
title = "Sistema de Propostas Comerciais"
version = "1.0.0"
id = "artifacts/proposta"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21709

[services.development]
run = "pnpm --filter @workspace/proposta run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proposta", "run", "build" ]
publicDir = "artifacts/proposta/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21709"
BASE_PATH = "/"
