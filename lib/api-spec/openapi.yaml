                items:
                  $ref: "#/components/schemas/TemplateUsageStat"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Invalid body, query string or path parameter
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Unauthorized:
      description: Missing, invalid, expired or revoked authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Forbidden:
      description: Authenticated principal does not have access to the resource
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    NotFound:
      description: Resource or route not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Conflict:
      description: Resource conflicts with current persisted state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    PayloadTooLarge:
      description: JSON or Base64 payload exceeds the route limit
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    UnsupportedMediaType:
      description: Mutating requests with a body must use application/json
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    RateLimited:
      description: Request rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the caller may retry
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    InternalError:
      description: Unexpected server error with no internal details exposed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"

  schemas:
    ApiError:
      type: object
      required: [code, message, requestId]
      additionalProperties: false
      properties:
        code:
          type: string
          examples: [VALIDATION_ERROR]
        message:
          type: string
        requestId:
          type: string
        fields:
          description: Optional validation issues safe to expose to the caller

    ApiErrorResponse:
      type: object
      required: [error]
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ApiError"

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # ─── AUTH ─────────────────────────────────────────────────────────────────

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    PublicResetPasswordInput:
      type: object
      required: [token, newPassword, confirmPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
        confirmPassword:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    MobileRefreshInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    MobileAuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # ─── USERS ────────────────────────────────────────────────────────────────

    User:
      type: object
      required: [id, name, email, role, active, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [ADMIN, COMERCIAL]
        active:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
        stationAccesses:
          type: array
          items:
            $ref: "#/components/schemas/UserStationAccess"

    UserStationAccess:
