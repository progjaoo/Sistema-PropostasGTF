      summary: Change proposal status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalStatusUpdate"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
