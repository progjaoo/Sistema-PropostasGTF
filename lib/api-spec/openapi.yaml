openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Sistema de Gerenciamento e Criação de Propostas Comerciais
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: stations
    description: Radio stations
  - name: advertisers
    description: Advertisers
  - name: productTemplates
    description: Product templates
  - name: proposalCategories
    description: Proposal categories
  - name: proposalTemplates
    description: Proposal templates
  - name: proposals
    description: Proposals

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ───────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Renew access token via refresh token
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/mobile/login:
    post:
      operationId: mobileLogin
      tags: [auth]
      summary: Mobile login with refresh token in response body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Mobile session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileAuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/mobile/refresh:
    post:
      operationId: mobileRefreshToken
      tags: [auth]
      summary: Renew mobile access token using refresh token from request body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileRefreshInput"
      responses:
        "200":
          description: Mobile token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileAuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/mobile/logout:
    post:
      operationId: mobileLogout
      tags: [auth]
      summary: Invalidate mobile refresh token from request body
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileRefreshInput"
      responses:
        "204":
          description: Logged out

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Invalidate refresh token
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get authenticated user data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "202":
          description: Password reset requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset-password:
    post:
      operationId: resetPasswordPublic
      tags: [auth]
      summary: Reset password with a one-time token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── USERS ──────────────────────────────────────────────────────────────────

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (Admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user and station accesses (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Edit user (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Deactivate user (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/reset-password:
    post:
      operationId: resetUserPassword
      tags: [users]
      summary: Admin resets a user password
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── STATIONS ───────────────────────────────────────────────────────────────

  /stations:
    get:
      operationId: listStations
      tags: [stations]
      summary: List stations (Admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of stations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Station"
    post:
      operationId: createStation
      tags: [stations]
      summary: Create station (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StationInput"
      responses:
        "201":
          description: Station created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Station"

  /stations/{id}:
    get:
      operationId: getStation
      tags: [stations]
      summary: Get station detail
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Station detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Station"
        "403":
          description: No access to station
        "404":
          description: Station not found
    patch:
      operationId: updateStation
      tags: [stations]
      summary: Update station (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StationUpdate"
      responses:
        "200":
          description: Station updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Station"

  /stations/{id}/presentation:
    get:
      operationId: getStationPresentation
      tags: [stations]
      summary: Get station default presentation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Station presentation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationPresentationResponse"
    put:
      operationId: updateStationPresentation
      tags: [stations]
      summary: Replace station default presentation (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StationPresentationInput"
      responses:
        "200":
          description: Station presentation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationPresentationResponse"

  # ─── ADVERTISERS ────────────────────────────────────────────────────────────

  /advertisers:
    get:
      operationId: listAdvertisers
      tags: [advertisers]
      summary: List advertisers with search/filter
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of advertisers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Advertiser"
    post:
      operationId: createAdvertiser
      tags: [advertisers]
      summary: Create advertiser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvertiserInput"
      responses:
        "201":
          description: Advertiser created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Advertiser"

  /advertisers/{id}:
    get:
      operationId: getAdvertiser
      tags: [advertisers]
      summary: Get advertiser detail
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Advertiser detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Advertiser"
    patch:
      operationId: updateAdvertiser
      tags: [advertisers]
      summary: Update advertiser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvertiserUpdate"
      responses:
        "200":
          description: Advertiser updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Advertiser"
    delete:
      operationId: deleteAdvertiser
      tags: [advertisers]
      summary: Deactivate advertiser (soft delete)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Advertiser deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Advertiser"

  # ─── PRODUCT TEMPLATES ───────────────────────────────────────────────────────

  /product-templates:
    get:
      operationId: listProductTemplates
      tags: [productTemplates]
      summary: List product templates
      security:
        - bearerAuth: []
      parameters:
        - name: stationId
          in: query
          schema:
            type: string
        - name: programId
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
        - name: minValue
          in: query
          schema:
            type: string
        - name: maxValue
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of product templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductTemplate"
    post:
      operationId: createProductTemplate
      tags: [productTemplates]
      summary: Create product template (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductTemplateInput"
      responses:
        "201":
          description: Product template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductTemplate"

  /product-templates/{id}:
    patch:
      operationId: updateProductTemplate
      tags: [productTemplates]
      summary: Update product template (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductTemplateUpdate"
      responses:
        "200":
          description: Product template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductTemplate"
    delete:
      operationId: deleteProductTemplate
      tags: [productTemplates]
      summary: Remove product template (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product template deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── PROPOSAL CATEGORIES ────────────────────────────────────────────────────

  /proposal-categories:
    get:
      operationId: listProposalCategories
      tags: [proposalCategories]
      summary: List proposal categories
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProposalCategory"
    post:
      operationId: createProposalCategory
      tags: [proposalCategories]
      summary: Create proposal category (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalCategoryInput"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalCategory"

  /proposal-categories/{id}:
    patch:
      operationId: updateProposalCategory
      tags: [proposalCategories]
      summary: Update proposal category (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalCategoryUpdate"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalCategory"
    delete:
      operationId: deleteProposalCategory
      tags: [proposalCategories]
      summary: Remove proposal category (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── PROPOSAL TEMPLATES ─────────────────────────────────────────────────────

  /proposal-templates:
    get:
      operationId: listProposalTemplates
      tags: [proposalTemplates]
      summary: List proposal templates (with optional categoryId filter)
      security:
        - bearerAuth: []
      parameters:
        - name: categoryId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of proposal templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProposalTemplate"
    post:
      operationId: createProposalTemplate
      tags: [proposalTemplates]
      summary: Create proposal template (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalTemplateInput"
      responses:
        "201":
          description: Proposal template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalTemplate"

  /proposal-templates/{id}:
    get:
      operationId: getProposalTemplate
      tags: [proposalTemplates]
      summary: Get proposal template detail (with products)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Proposal template detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalTemplate"
    patch:
      operationId: updateProposalTemplate
      tags: [proposalTemplates]
      summary: Update proposal template (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalTemplateUpdate"
      responses:
        "200":
          description: Proposal template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalTemplate"
    delete:
      operationId: deleteProposalTemplate
      tags: [proposalTemplates]
      summary: Remove proposal template (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Proposal template deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /proposal-templates/{id}/use:
    post:
      operationId: useProposalTemplate
      tags: [proposalTemplates]
      summary: Create a proposal from this template
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Proposal created from template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  # ─── PROPOSALS ──────────────────────────────────────────────────────────────

  /proposals:
    get:
      operationId: listProposals
      tags: [proposals]
      summary: List proposals (own for COMERCIAL, all for ADMIN) with pagination and filters
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: advertiserId
          in: query
          schema:
            type: string
        - name: stationId
          in: query
          schema:
            type: string
        - name: proposalTypeId
          in: query
          schema:
            type: string
        - name: createdById
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, updatedAt]
        - name: sortDir
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated proposals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
    post:
      operationId: createProposal
      tags: [proposals]
      summary: Create a new proposal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalInput"
      responses:
        "201":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /proposals/{id}:
    get:
      operationId: getProposal
      tags: [proposals]
      summary: Get proposal full detail
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Proposal detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateProposal
      tags: [proposals]
      summary: Save proposal changes (auto-creates version)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalUpdate"
      responses:
        "200":
          description: Proposal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
    delete:
      operationId: deleteProposal
      tags: [proposals]
      summary: Archive/delete proposal
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Proposal archived
          content:
