      summary: List proposal version history
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProposalVersion"

  /proposals/{id}/versions/{versionId}:
    get:
      operationId: getProposalVersion
      tags: [proposals]
      summary: Get a specific version snapshot
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Version snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalVersion"

  # ─── DASHBOARD ──────────────────────────────────────────────────────────────

  /dashboard/stats:
